<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forge — WebSocket Chat</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 0%, #1a2233, #0d1117);
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5vh 4vw;
    }

    header { text-align: center; margin-bottom: 1.5rem; }
    header h1 { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: .6rem; }
    header p { color: #9aa6b2; font-size: 1.05rem; max-width: 640px; }
    code { background: #21262d; padding: .15rem .45rem; border-radius: 5px;
      font-family: ui-monospace, Menlo, monospace; font-size: .9em; }

    /* Big, obvious call-to-action so nobody has to guess */
    .hint {
      display: flex; align-items: center; gap: 1rem;
      background: #161b22; border: 1px solid #30425f;
      border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem;
      max-width: 900px; width: 100%;
    }
    .hint .num {
      flex: none; width: 2.2rem; height: 2.2rem; border-radius: 50%;
      background: #4c9aff; color: #04122b; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .hint p { color: #c9d6e3; font-size: 1rem; }
    .hint button {
      margin-left: auto; flex: none; padding: .8rem 1.4rem; border: 0;
      border-radius: 10px; background: #4c9aff; color: #04122b;
      font-weight: 700; font-size: 1rem; cursor: pointer;
    }
    .hint button:hover { background: #6db0ff; }

    .chat {
      width: 100%; max-width: 900px; flex: 1;
      display: flex; flex-direction: column;
      background: #161b22; border: 1px solid #21262d;
      border-radius: 14px; overflow: hidden; min-height: 0;
    }
    .status {
      padding: .8rem 1.4rem; border-bottom: 1px solid #21262d;
      font-size: .95rem; color: #8b949e;
      display: flex; align-items: center; gap: .6rem;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%;
      background: #f85149; transition: background .2s; }
    .dot.on { background: #36b37e; }

    #log {
      flex: 1; overflow-y: auto; padding: 1.4rem;
      display: flex; flex-direction: column; gap: .6rem;
      font-size: 1.05rem; min-height: 0;
    }
    #log .msg {
      align-self: flex-start; background: #243049;
      padding: .6rem 1rem; border-radius: 12px 12px 12px 4px;
      max-width: 75%; word-break: break-word;
    }
    #log .sys {
      align-self: center; color: #8b949e; font-style: italic;
      font-size: .9rem;
    }

    form {
      display: flex; gap: .8rem; padding: 1.2rem 1.4rem;
      border-top: 1px solid #21262d;
    }
    input {
      flex: 1; padding: 1rem 1.2rem; border-radius: 12px;
      border: 1px solid #30425f; background: #0d1117;
      color: #e6edf3; font-size: 1.05rem;
    }
    input:focus { outline: 2px solid #4c9aff; }
    form button {
      padding: 1rem 1.8rem; border: 0; border-radius: 12px;
      background: #4c9aff; color: #04122b; font-weight: 700;
      font-size: 1.05rem; cursor: pointer;
    }
    form button:hover { background: #6db0ff; }
  </style>
</head>
<body>
  <header>
    <h1>⚒ WebSocket Chat</h1>
    <p>Real-time chat over a <strong>hand-rolled WebSocket</strong> on raw
       <code>net</code> sockets — no <code>ws</code> library, no
       <code>http</code> module.</p>
  </header>

  <div class="hint">
    <span class="num">1</span>
    <p>This is a chat <strong>between browser tabs</strong>. Click the button
       to open a second tab, then type in either one — messages appear in both
       instantly.</p>
    <button id="openTab">Open a 2nd tab →</button>
  </div>

  <div class="chat">
    <div class="status"><span class="dot" id="dot"></span><span id="state">connecting…</span></div>
    <div id="log"></div>
    <form id="f">
      <input id="m" autocomplete="off" placeholder="Type a message and press Send…" />
      <button>Send</button>
    </form>
  </div>

  <script>
    document.getElementById('openTab').addEventListener('click', () => {
      window.open(location.href, '_blank');
    });

    const log = document.getElementById('log');
    const dot = document.getElementById('dot');
    const state = document.getElementById('state');
    const add = (text, cls) => {
      const d = document.createElement('div');
      d.className = cls || 'msg';
      d.textContent = text;
      log.appendChild(d);
      log.scrollTop = log.scrollHeight;
    };

    const ws = new WebSocket(`ws://${location.host}/chat`);
    ws.onopen = () => { dot.classList.add('on'); state.textContent = 'connected'; };
    ws.onclose = () => { dot.classList.remove('on'); state.textContent = 'disconnected'; };
    ws.onmessage = (e) => {
      const d = JSON.parse(e.data);
      if (d.system) add(d.system, 'sys');
      else add(d.msg);
    };
    document.getElementById('f').addEventListener('submit', (ev) => {
      ev.preventDefault();
      const i = document.getElementById('m');
      if (i.value && ws.readyState === 1) { ws.send(i.value); i.value = ''; }
    });
  </script>
</body>
</html>
