<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forge — Draw &amp; Guess</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at 50% 0%, #1a2233, #0d1117);
      color: #e6edf3; min-height: 100vh; padding: 2vh 3vw;
    }
    h1 { text-align: center; font-size: clamp(1.6rem, 3vw, 2.4rem);
      margin-bottom: .3rem; }
    .sub { text-align: center; color: #9aa6b2; margin-bottom: 1.2rem;
      font-size: .95rem; }
    code { background:#21262d; padding:.1rem .4rem; border-radius:5px;
      font-family:ui-monospace,Menlo,monospace; }

    #join { max-width: 420px; margin: 6vh auto; text-align: center;
      background:#161b22; border:1px solid #21262d; border-radius:14px;
      padding: 2rem; }
    #join input { width: 100%; padding: .9rem 1rem; margin: 1rem 0;
      border-radius:10px; border:1px solid #30425f; background:#0d1117;
      color:#e6edf3; font-size:1.05rem; }
    button { padding:.85rem 1.4rem; border:0; border-radius:10px;
      background:#4c9aff; color:#04122b; font-weight:700; font-size:1rem;
      cursor:pointer; }
    button:hover { background:#6db0ff; }
    button:disabled { opacity:.4; cursor:not-allowed; }

    #game { display:none; max-width: 1050px; margin: 0 auto;
      grid-template-columns: 1fr 280px; gap: 1.2rem; }
    @media (max-width: 820px){ #game{ grid-template-columns:1fr; } }

    .bar { grid-column:1/-1; display:flex; align-items:center; gap:1rem;
      background:#161b22; border:1px solid #21262d; border-radius:12px;
      padding:.8rem 1.2rem; flex-wrap:wrap; }
    .word { font-size:1.2rem; letter-spacing:.3em; font-weight:700; }
    .timer { margin-left:auto; font-variant-numeric:tabular-nums;
      color:#ffab00; font-weight:700; }
    .role { color:#9aa6b2; }

    .panel { background:#161b22; border:1px solid #21262d;
      border-radius:14px; overflow:hidden; }
    #board { display:block; width:100%; background:#fff; cursor:crosshair;
      touch-action:none; }
    .tools { display:flex; gap:.5rem; padding:.7rem 1rem; flex-wrap:wrap;
      border-top:1px solid #21262d; align-items:center; }
    .sw { width:26px; height:26px; border-radius:50%; cursor:pointer;
      border:2px solid #0d1117; }
    .sw.active { border-color:#fff; }
    .tools button { padding:.45rem .9rem; font-size:.85rem; }

    .side { display:flex; flex-direction:column; gap:1.2rem; }
    .scores, .chatbox { background:#161b22; border:1px solid #21262d;
      border-radius:14px; overflow:hidden; }
    .scores h3, .chatbox h3 { padding:.7rem 1rem; font-size:.9rem;
      color:#8b949e; border-bottom:1px solid #21262d; }
    .scores ul { list-style:none; }
    .scores li { display:flex; justify-content:space-between;
      padding:.5rem 1rem; font-size:.95rem; border-bottom:1px solid #1c222b; }
    .scores li.draw { color:#4c9aff; }
    #log { height:220px; overflow-y:auto; padding:.8rem 1rem;
      display:flex; flex-direction:column; gap:.35rem; font-size:.9rem; }
    #log .sys { color:#8b949e; font-style:italic; }
    #log .me { color:#36b37e; }
    form { display:flex; gap:.5rem; padding:.7rem 1rem;
      border-top:1px solid #21262d; }
    form input { flex:1; padding:.6rem .8rem; border-radius:8px;
      border:1px solid #30425f; background:#0d1117; color:#e6edf3; }
  </style>
</head>
<body>
  <h1>⚒ Draw &amp; Guess</h1>
  <p class="sub">Multiplayer Pictionary over a hand-rolled WebSocket on raw
     <code>net</code>. Open in 2+ tabs (or share with a friend) to play.</p>

  <div id="join">
    <h3>Enter a name to play</h3>
    <input id="name" maxlength="16" placeholder="Your name" autocomplete="off">
    <button id="go">Join game →</button>
    <p class="sub" style="margin-top:1rem">Need 2 players. Open a second tab
       and join again to start a round.</p>
  </div>

  <div id="game">
    <div class="bar">
      <span class="role" id="role">connecting…</span>
      <span class="word" id="word"></span>
      <span class="timer" id="timer"></span>
    </div>

    <div class="panel">
      <canvas id="board" width="760" height="460"></canvas>
      <div class="tools" id="tools">
        <span class="sw active" style="background:#111" data-c="#111111"></span>
        <span class="sw" style="background:#e23636" data-c="#e23636"></span>
        <span class="sw" style="background:#36b37e" data-c="#36b37e"></span>
        <span class="sw" style="background:#4c9aff" data-c="#4c9aff"></span>
        <span class="sw" style="background:#ffab00" data-c="#ffab00"></span>
        <button id="clear">Clear</button>
        <span class="sub" id="hint" style="margin:0 0 0 auto"></span>
      </div>
    </div>

    <div class="side">
      <div class="scores"><h3>SCOREBOARD</h3><ul id="scores"></ul></div>
      <div class="chatbox">
        <h3>GUESSES &amp; CHAT</h3>
        <div id="log"></div>
        <form id="gf"><input id="guess" autocomplete="off"
          placeholder="Type your guess…"><button>Send</button></form>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let ws, me = { drawer: false }, endsAt = 0, color = '#111111';

    $('go').onclick = () => {
      const name = $('name').value.trim() || 'anon';
      ws = new WebSocket(`ws://${location.host}/game`);
      ws.onopen = () => ws.send(JSON.stringify({ type: 'join', name }));
      ws.onmessage = (e) => handle(JSON.parse(e.data));
      ws.onclose = () => addLog('disconnected', 'sys');
      $('join').style.display = 'none';
      $('game').style.display = 'grid';
    };
    $('name').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('go').click();
    });

    const canvas = $('board'), ctx = canvas.getContext('2d');
    ctx.lineWidth = 4; ctx.lineCap = 'round';
    let drawing = false, last = null;

    function pos(e) {
      const r = canvas.getBoundingClientRect();
      const t = e.touches ? e.touches[0] : e;
      return {
        x: (t.clientX - r.left) * (canvas.width / r.width),
        y: (t.clientY - r.top) * (canvas.height / r.height),
      };
    }
    function stroke(s, broadcast) {
      ctx.strokeStyle = s.c; ctx.beginPath();
      ctx.moveTo(s.x0, s.y0); ctx.lineTo(s.x1, s.y1); ctx.stroke();
      if (broadcast && ws && ws.readyState === 1)
        ws.send(JSON.stringify({ type: 'stroke', s }));
    }
    function start(e) {
      if (!me.drawer) return;
      drawing = true; last = pos(e); e.preventDefault();
    }
    function move(e) {
      if (!drawing || !me.drawer) return;
      const p = pos(e);
      stroke({ x0: last.x, y0: last.y, x1: p.x, y1: p.y, c: color }, true);
      last = p; e.preventDefault();
    }
    const stop = () => (drawing = false);
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', stop);

    $('tools').addEventListener('click', (e) => {
      if (!e.target.dataset.c) return;
      color = e.target.dataset.c;
      document.querySelectorAll('.sw').forEach((s) =>
        s.classList.toggle('active', s === e.target));
    });
    $('clear').onclick = () => {
      if (me.drawer && ws) ws.send(JSON.stringify({ type: 'clear' }));
    };
    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    $('gf').addEventListener('submit', (ev) => {
      ev.preventDefault();
      const v = $('guess').value.trim();
      if (v && ws && ws.readyState === 1) {
        ws.send(JSON.stringify({ type: 'guess', text: v }));
        $('guess').value = '';
      }
    });

    function addLog(text, cls) {
      const d = document.createElement('div');
      if (cls) d.className = cls;
      d.textContent = text;
      $('log').appendChild(d);
      $('log').scrollTop = $('log').scrollHeight;
    }
    function renderScores(players) {
      $('scores').innerHTML = players
        .sort((a, b) => b.score - a.score)
        .map((p) => `<li class="${p.drawing ? 'draw' : ''}">
          <span>${p.drawing ? '✏️ ' : ''}${esc(p.name)}</span>
          <strong>${p.score}</strong></li>`)
        .join('');
    }
    function esc(s){ return String(s).replace(/[&<>]/g,
      c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    function applyState(m) {
      me.drawer = m.youAreDrawer;
      if (m.players) renderScores(m.players);
      endsAt = m.endsAt || 0;
      if (!m.roundActive) {
        $('role').textContent = 'Waiting…';
        $('word').textContent = '';
        $('hint').textContent = '';
        return;
      }
      if (m.youAreDrawer) {
        $('role').textContent = '✏️ You are drawing:';
        $('word').textContent = m.word;
        $('hint').textContent = 'Draw it — others guess!';
      } else {
        $('role').textContent = `${m.drawerName || '?'} is drawing`;
        $('word').textContent = '_ '.repeat(m.wordLength).trim();
        $('hint').textContent = 'Guess in the box →';
      }
    }

    function handle(m) {
      if (m.type === 'state') applyState(m);
      else if (m.type === 'players') renderScores(m.players);
      else if (m.type === 'stroke') stroke(m.s, false);
      else if (m.type === 'clear') clearCanvas();
      else if (m.type === 'system') addLog(m.text, 'sys');
      else if (m.type === 'chat') addLog(`${m.name}: ${m.text}`);
    }

    setInterval(() => {
      if (!endsAt) { $('timer').textContent = ''; return; }
      const s = Math.max(0, Math.round((endsAt - Date.now()) / 1000));
      $('timer').textContent = `⏱ ${s}s`;
    }, 250);
  </script>
</body>
</html>
